project_id = "ko-pick"

[functions.kopick-api]
# 장소·인기 조회는 비로그인 사용자도 사용합니다.
# 회원탈퇴는 함수 내부에서 전달된 Supabase JWT를 다시 검증합니다.
verify_jwt = false

[functions.naver-userinfo]
# Supabase Auth가 네이버 access token으로 서버 간 호출하는 UserInfo 어댑터입니다.
verify_jwt = false

[functions.configure-social-auth]
# GitHub Actions의 일회성 bootstrap token으로만 호출합니다.
verify_jwt = false
