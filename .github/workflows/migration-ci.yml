name: Supabase Migration CI

on:
  pull_request:
  push:
    branches:
      - main
      - agent/migrate-all-to-supabase

permissions:
  contents: read

jobs:
  application:
    name: Next.js validation
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      NEXT_PUBLIC_KAKAO_MAP_KEY: ci-placeholder
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build Next.js
        run: npm run build

  edge-function:
    name: Supabase Edge Function check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Edge Functions
        id: deno-check
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            echo "=== kopick-api ==="
            deno check supabase/functions/kopick-api/index.ts
            first=$?
            echo
            echo "=== naver-userinfo ==="
            deno check supabase/functions/naver-userinfo/index.ts
            second=$?
            echo
            echo "kopick_api_status=$first"
            echo "naver_userinfo_status=$second"
          } > edge-function-check.log 2>&1
          if [ "$first" -eq 0 ] && [ "$second" -eq 0 ]; then
            echo 0 > edge-function-check.status
          else
            echo 1 > edge-function-check.status
          fi
          cat edge-function-check.log

      - name: Upload Edge Function diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-function-check
          path: |
            edge-function-check.log
            edge-function-check.status
          if-no-files-found: error
          retention-days: 3

      - name: Require successful Edge Function checks
        shell: bash
        run: test "$(cat edge-function-check.status)" = "0"
