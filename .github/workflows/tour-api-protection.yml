name: TourAPI Protection

on:
  push:
    branches: [main, agent/migrate-all-to-supabase]
  pull_request:

permissions:
  contents: read

jobs:
  protect-tour-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify canonical Supabase TourAPI files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "supabase/functions/kopick-api/index.ts"
            "supabase/config.toml"
            "components/CategoryExplorePage.tsx"
            "utils/spring-api.ts"
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Protected TourAPI file missing or empty: $file"; exit 1; }
          done

      - name: Verify server-side TourAPI source rule
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'TOUR_API_SERVICE_KEY' supabase/functions/kopick-api/index.ts
          grep -q 'apis.data.go.kr/B551011/KorService2' supabase/functions/kopick-api/index.ts
          grep -q '/api/public/tour/places' components/CategoryExplorePage.tsx
          grep -q '/functions/v1/kopick-api' utils/spring-api.ts
          ! grep -R --line-number --exclude-dir=node_modules --exclude-dir=.git \
            'NEXT_PUBLIC_TOUR_API\|NEXT_PUBLIC_.*SERVICE_KEY' app components utils

      - name: Verify Render is not an active deployment target
        shell: bash
        run: |
          set -euo pipefail
          test ! -e render.yaml
          test ! -e .github/workflows/keep-render-awake.yml

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check TourAPI Edge Function
        run: deno check --node-modules-dir=auto supabase/functions/kopick-api/index.ts
