name: Verify Weather UI

on:
  push:
    branches: [main]
    paths:
      - "app/api/weather/route.ts"
      - "components/HeroWeatherDashboard.tsx"
      - "app/home-weather-dashboard.css"
      - ".github/workflows/verify-weather-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mark verification pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context='Weather UI Build' \
            -f description='Checking hourly weather transitions' \
            -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Report verification result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        run: |
          if [ "$RESULT" = "success" ]; then
            state=success
            description='Hourly weather transitions build successfully'
          else
            state=failure
            description='Weather UI build failed; inspect workflow logs'
          fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='Weather UI Build' \
            -f description="$description" \
            -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
