name: Frontend Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        id: next-build
        continue-on-error: true
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build > build.log 2>&1

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: build.log
          if-no-files-found: error

      - name: Fail when build failed
        if: steps.next-build.outcome == 'failure'
        run: exit 1
