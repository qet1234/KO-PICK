name: Keep Render API Awake

on:
  schedule:
    # Render Free sleeps after 15 minutes without inbound traffic.
    # Use an offset from the top of the hour to reduce schedule congestion.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-api-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping KO-PICK API health endpoint
        shell: bash
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            https://kopick-api.onrender.com/actuator/health
