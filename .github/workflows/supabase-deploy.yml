name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN is missing"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID is missing"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD is missing"; exit 1; }

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Preview database migration
        run: supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migration
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy regular Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          for directory in supabase/functions/*; do
            [ -d "$directory" ] || continue
            function_name="$(basename "$directory")"
            case "$function_name" in
              kopick-api|kopick-gateway|kopick-place-gateway|kopick-core) continue ;;
            esac
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
          done

      - name: Deploy KO-PICK core and public gateway
        shell: bash
        run: |
          set -euo pipefail
          rm -rf supabase/functions/kopick-core
          cp -R supabase/functions/kopick-api supabase/functions/kopick-core
          supabase functions deploy kopick-core --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
          cp supabase/functions/kopick-place-gateway/index.ts supabase/functions/kopick-api/index.ts
          supabase functions deploy kopick-api --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
