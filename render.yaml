# Deployment sync: region-depth nationwide booking lookup
services:
  - type: web
    name: kopick-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kopick-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: kopick-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: kopick-db
          property: password
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: TOUR_API_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: KEYWORD_HASH_SALT
        generateValue: true
      - key: JWT_ISSUER
        value: KO-PICK
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 14d
      - key: TOUR_API_MOBILE_APP
        value: KoreaPick
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: None
      - key: JAVA_TOOL_OPTIONS
        value: -Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=64m -XX:MaxDirectMemorySize=32m -XX:+UseSerialGC -Xss512k

databases:
  - name: kopick-db
    plan: free
    region: singapore
    postgresMajorVersion: "17"
    databaseName: kopick
    user: kopick
    ipAllowList: []
