server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: KOPICK_SESSION
        http-only: true
        secure: ${COOKIE_SECURE:true}
        same-site: ${COOKIE_SAME_SITE:none}
      timeout: 30m

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kopick}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
    timeout: 30m
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:https://kopick-api.onrender.com/login/oauth2/code/google}
            scope: openid,profile,email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_REDIRECT_URI:https://kopick-api.onrender.com/login/oauth2/code/kakao}
            scope: profile_nickname,profile_image,account_email
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${NAVER_REDIRECT_URI:https://kopick-api.onrender.com/login/oauth2/code/naver}
            scope: name,nickname,email,profile_image
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

app:
  frontend-url: ${FRONTEND_URL:https://koreapick.duckdns.org}
  allowed-origins: ${ALLOWED_ORIGINS:https://koreapick.duckdns.org}
  keyword-hash-salt: ${KEYWORD_HASH_SALT:korea-pick}
  jwt:
    secret: ${JWT_SECRET:local-development-secret-must-be-at-least-32-bytes}
    issuer: ${JWT_ISSUER:KO-PICK}
    access-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-ttl: ${JWT_REFRESH_TTL:14d}
  cookie:
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:None}
    domain: ${COOKIE_DOMAIN:}

tour-api:
  service-key: ${TOUR_API_SERVICE_KEY:}
  mobile-app: ${TOUR_API_MOBILE_APP:KoreaPick}

kakao-local:
  rest-api-key: ${KAKAO_REST_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
